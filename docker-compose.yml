services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public (non-secret) vars baked in at build time
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: sesli-agent:latest
    container_name: sesli-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Secret vars injected at runtime (never baked into image)
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      VAPI_TOKEN: ${VAPI_TOKEN}
      VAPI_SERVER_URL_SECRET: ${VAPI_SERVER_URL_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      RESTAURANT_PHONE_NUMBER: ${RESTAURANT_PHONE_NUMBER}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
