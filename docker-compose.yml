services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public (non-secret) vars baked in at build time
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: sesli-agent:latest
    container_name: sesli-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Secret vars injected at runtime (never baked into image)
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      VAPI_TOKEN: ${VAPI_TOKEN}
      VAPI_SERVER_URL_SECRET: ${VAPI_SERVER_URL_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      RESTAURANT_PHONE_NUMBER: ${RESTAURANT_PHONE_NUMBER}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Phase 45A: New dedicated backend — separate production service
  # Routed via Traefik as api.voice.autoviseo.com
  # Does NOT touch or replace the existing sesli-agent frontend.
  # ============================================================
  sesli-agent-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sesli-agent-backend:latest
    container_name: sesli-agent-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      PUBLIC_API_URL: "https://api.voice.autoviseo.com"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      # Injected from host .env — never baked into image
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      JWT_SECRET: ${BACKEND_JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${BACKEND_CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: info
      # Optional: credentials encryption key for IntegrationConnection secrets
      # INTEGRATION_CREDENTIALS_ENCRYPTION_KEY: ${BACKEND_INTEGRATION_CREDENTIALS_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - traefik-net
      - deploy_internal
    labels:
      # Traefik v2/v3 — routes api.voice.autoviseo.com to this container.
      # Verify the cert resolver name on VPS: docker inspect <traefik-container> | grep -i certresolver
      # Common names: le, letsencrypt, leresolver
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.sesli-agent-backend.rule=Host(`api.voice.autoviseo.com`)"
      - "traefik.http.routers.sesli-agent-backend.entrypoints=websecure"
      - "traefik.http.routers.sesli-agent-backend.tls=true"
      - "traefik.http.routers.sesli-agent-backend.tls.certresolver=httpresolver"
      - "traefik.http.services.sesli-agent-backend.loadbalancer.server.port=4000"

networks:
  # Traefik's shared external network. Inspect the exact name on VPS with:
  #   docker network ls | grep -Ei 'traefik|web|proxy'
  # If the name differs from "traefik", update here AND in the service's
  # networks list above before deploying.
  traefik-net:
    external: true
  deploy_internal:
    external: true
